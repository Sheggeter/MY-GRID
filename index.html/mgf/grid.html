<!DOCTYPE html>
<html>
<head>
    <title>MY WEB</title>
    <style>
        
        .grid1{
            display: grid;
            grid-template-columns: 200px 75px;
            margin-bottom: 20px;
        }

        .box1{
            background-color: lightblue;
            padding: 10px;
        }

        .box2{
            background-color: lightpink;
            padding: 10px;
        }

        
        .grid2{display: grid;
            grid-template-columns: 50px 1fr 50px;
            margin-bottom: 20px;

       
        }

        .div1{background-color:lightblue;
        padding: 10px;
    }
        .div3{
            background-color: lightblue;
            padding: 10px;
    
        }

        .div2{
            background-color: lightpink;
            padding: 10px;
        
        }

        
        .grid3{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            column-gap: 20px;
            row-gap: 10px;
        }

        .item{
            background-color: lightpink;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="grid1">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>

    <div class="grid2">
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3"></div>

    </div>

    <div class="grid3">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>

        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>

</body>
</html>
